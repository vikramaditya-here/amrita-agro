backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  - name: "products"
    label: "Products"
    folder: "_data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Tag (e.g. Product 01)", name: "tag", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Benefits"
        name: "benefits"
        widget: "list"
        field: { label: "Benefit", name: "benefit", widget: "string" }
      - { label: "Product Photo", name: "photo", widget: "image" }

  - name: "gallery"
    label: "Gallery"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Photo Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Factory", "Products", "Team"]
      - { label: "Photo", name: "photo", widget: "image" }

  - name: "slideshow"
    label: "Slideshow"
    folder: "_data/slideshow"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["photo", "video"]
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Video URL", name: "video", widget: "string", required: false }

  - name: "contact"
    label: "Contact Details"
    files:
      - label: "Contact Info"
        name: "contact"
        file: "_data/contact.yml"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Business Hours", name: "hours", widget: "string" }
          - { label: "WhatsApp Number (with country code)", name: "whatsapp", widget: "string" }